<div class="login-container">
  <div class="login-box">
    <div class="login-visual">
      <div class="overlay"></div>
      <div class="visual-content">
        <div class="logo">
          <i class="fas fa-cut"></i>
          <span>BarberPro</span>
        </div>
        <h1>Gestiona tu barbería con un solo clic.</h1>
      </div>
    </div>

    <div class="login-form-section">
      <form class="login-form" [formGroup]="loginForm">
        @if (errorMessage()) {
    <div class="error-banner">
      <i class="fas fa-exclamation-circle"></i>
      {{ errorMessage() }}
    </div>
  }
        <h2>Bienvenido de nuevo</h2>
        <p class="subtitle">Ingresa tus credenciales para acceder</p>

        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="far fa-envelope"></i>
            <input type="email" formControlName="email" placeholder="admin@barberpro.com">
          </div>
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <div class="form-options">
          
          <a href="">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="btn-login" (click)="onLogin()">Iniciar Sesión</button>
        
        <p class="footer-text">
          ¿No tienes una cuenta? <a href="#">Contactar soporte</a>
        </p>
      </form>
    </div>
  </div>
</div>
